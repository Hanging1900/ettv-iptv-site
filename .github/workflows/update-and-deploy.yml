name: Update IPTV data and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
    - cron: "0 2 * * *"
    - cron: "0 10 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update channel data
        env:
          IPTV_SOURCE_URLS: ${{ secrets.IPTV_SOURCE_URLS }}
        run: node scripts/update.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
